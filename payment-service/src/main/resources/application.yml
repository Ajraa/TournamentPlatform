micronaut:
  application:
    name: payment-service
  server:
    port: 8081

datasources:
  default:
    db-type: postgres
    dialect: POSTGRES
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/tournament-platform
    username: postgres
    password: root

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate

rabbitmq:
  host: localhost
  port: 5672
  username: guest
  password: guest