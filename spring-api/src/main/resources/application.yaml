spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tournament-platform
    username: postgres
    password: root
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE